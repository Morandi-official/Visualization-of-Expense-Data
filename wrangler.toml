name = "visualization-of-expense-data"
compatibility_date = "2026-06-06"
pages_build_output_dir = "."

# 创建 D1 后，把 database_id 替换为 Cloudflare 返回的真实 ID。
# 代码中固定使用 env.DB，因此 binding 必须保持为 DB。
[[d1_databases]]
binding = "DB"
database_name = "expense-data-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
